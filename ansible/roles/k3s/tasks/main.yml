---
# Layer 3 — Kubernetes
# Installs K3s (lightweight Kubernetes with bundled containerd)

- name: Download K3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0755"

- name: Install K3s
  ansible.builtin.command:
    cmd: "sh /tmp/k3s-install.sh {{ k3s_server_extra_args }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_KUBECONFIG_MODE: "{{ k3s_kubeconfig_mode }}"
  args:
    creates: /usr/local/bin/k3s
  notify: Wait for K3s readiness

- name: Flush handlers to wait for K3s readiness
  ansible.builtin.meta: flush_handlers

- name: Ensure k3s service is running and enabled
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true

- name: Ensure kubeconfig directory for user
  ansible.builtin.file:
    path: "~{{ k3s_kubeconfig_user }}/.kube"
    state: directory
    owner: "{{ k3s_kubeconfig_user }}"
    group: "{{ k3s_kubeconfig_user }}"
    mode: "0755"

- name: Copy k3s kubeconfig to user home
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "~{{ k3s_kubeconfig_user }}/.kube/config"
    owner: "{{ k3s_kubeconfig_user }}"
    group: "{{ k3s_kubeconfig_user }}"
    mode: "0600"
    remote_src: true

- name: Apply node labels
  ansible.builtin.command:
    cmd: "kubectl label node {{ ansible_facts.hostname }} {{ item.key }}={{ item.value }} --overwrite"
  loop: "{{ k3s_node_labels | dict2items }}"
  when: k3s_node_labels | length > 0
  changed_when: false

- name: Open K3s ports in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "K3s: {{ item.comment }}"
  loop: "{{ k3s_ufw_ports }}"
  when: k3s_ufw_ports | length > 0
