---
- name: Layer 1 — Bootstrap Ubuntu Server
  hosts: all
  become: true
  gather_facts: true
  tags:
    - init
    - bootstrap

  roles:
    - role: apt
    - role: common-packages
    - role: hostname
    - role: timezone
    - role: locale
    - role: ntp
    - role: ssh

- name: Layer 2 — Security Hardening
  hosts: all
  become: true
  gather_facts: true
  tags:
    - init
    - security

  roles:
    - role: security
