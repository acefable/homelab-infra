---
- name: Layer 1 — Bootstrap Ubuntu Server
  hosts: all
  become: true
  gather_facts: true
  tags:
    - init
    - bootstrap

  roles:
    - role: apt
    - role: common-packages
    - role: hostname
    - role: timezone
    - role: locale
    - role: ntp
    - role: ssh

- name: Layer 2 — Security Hardening
  hosts: all
  become: true
  gather_facts: true
  tags:
    - init
    - security

  roles:
    - role: security

- name: Layer 3 — Kubernetes
  hosts: all
  become: true
  gather_facts: true
  tags:
    - init
    - kubernetes
  roles:
    - role: k3s

- name: Layer 4 — Cloudflare Tunnel
  hosts: all
  become: true
  gather_facts: true
  tags:
    - init
    - networking
  roles:
    - role: cloudflare-tunnel
