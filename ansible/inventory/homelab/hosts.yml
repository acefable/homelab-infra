---
all:
  hosts:
    acefoundry:
      ansible_host: "{{ lookup('env', 'HOMELAB_SERVER_IP') | default('192.168.1.100', true) }}"
  vars:
    ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('ubuntu', true) }}"
    ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_SSH_PRIVATE_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
