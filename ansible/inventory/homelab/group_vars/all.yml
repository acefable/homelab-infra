---
# Layer 1 — Bootstrap Variables

# Hostname
hostname_name: "{{ lookup('env', 'HOMELAB_HOSTNAME') | default('ubuntu-server', true) }}"

# Timezone
timezone_timezone: Etc/UTC

# Locale
locale_locale: en_US.UTF-8

# NTP
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org

ntp_fallback_servers:
  - 0.ubuntu.pool.ntp.org
  - 1.ubuntu.pool.ntp.org

# SSH — Layer 1: permissive for bootstrap; Layer 2+: hardened
ssh_port: 22
ssh_permit_root_login: "no"
ssh_pubkey_authentication: "yes"
ssh_password_authentication: "no"       # Disabled in Layer 2 after SSH keys verified
ssh_challenge_response_authentication: "no"
ssh_use_pam: "yes"
ssh_print_motd: "no"
ssh_loglevel: "VERBOSE"
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# Layer 2 — Security Variables

# UFW
security_ufw_default_deny: true
security_ufw_ssh_port: "{{ ssh_port }}"

# Fail2Ban
security_fail2ban_enabled: true
security_fail2ban_bantime: 1h
security_fail2ban_findtime: 600
security_fail2ban_maxretry: 5

# Automatic security updates
security_unattended_upgrades_enabled: true
security_unattended_upgrades_reboot: false
security_unattended_upgrades_reboot_time: "02:00"

# Audit tools
security_audit_tools:
  - auditd
  - lynis
  - rkhunter

# Layer 3 — Kubernetes Variables

# K3s version (empty = latest stable)
k3s_version: ""

# Kubeconfig permissions
k3s_kubeconfig_mode: "644"

# User to receive kubeconfig
k3s_kubeconfig_user: "{{ ansible_user | default('ubuntu') }}"

# Additional K3s server flags (e.g., --disable traefik)
k3s_server_extra_args: ""

# Node labels
k3s_node_labels: {}

# Layer 4 — Cloudflare Tunnel Variables

# Tunnel ID (from Terraform output, set in .env as TF_VAR_cloudflare_tunnel_id)
cloudflare_tunnel_id: "{{ lookup('env', 'TF_VAR_cloudflare_tunnel_id') | default('', true) }}"

# Tunnel token (from Terraform output, used with cloudflared tunnel run --token)
cloudflare_tunnel_token: "{{ lookup('env', 'TF_VAR_cloudflare_tunnel_token') | default('', true) }}"

# Tunnel name (must match Terraform's tunnel_name)
cloudflare_tunnel_name: "{{ lookup('env', 'TF_VAR_tunnel_name') | default('homelab-tunnel', true) }}"

# Layer 5 — Argo CD (GitOps) Variables

# Argo CD version (empty = latest stable)
argocd_version: "{{ lookup('env', 'ARGOCD_VERSION') | default('', true) }}"

# Git repository URL for Argo CD to watch
argocd_repo_url: "{{ lookup('env', 'ARGOCD_REPO_URL') | default('', true) }}"

# SSH private key for private repo access (content, not path)
argocd_repo_ssh_private_key: "{{ lookup('env', 'ARGOCD_REPO_SSH_PRIVATE_KEY') | default('', true) }}"

# Path within the repo where Kubernetes app manifests live
argocd_app_path: "{{ lookup('env', 'ARGOCD_APP_PATH') | default('kubernetes/argocd', true) }}"

# Name of the bootstrap Application resource
argocd_app_name: "{{ lookup('env', 'ARGOCD_APP_NAME') | default('homelab', true) }}"

# Sync policy — all default to true for GitOps
argocd_auto_sync: "{{ lookup('env', 'ARGOCD_AUTO_SYNC') | default('true', true) }}"
argocd_self_heal: "{{ lookup('env', 'ARGOCD_SELF_HEAL') | default('true', true) }}"
argocd_prune: "{{ lookup('env', 'ARGOCD_PRUNE') | default('true', true) }}"

# Admin password bcrypt hash (if set, overrides the auto-generated password)
argocd_admin_password_hash: "{{ lookup('env', 'ARGOCD_ADMIN_PASSWORD_HASH') | default('', true) }}"

# Git branch/tag/commit that Argo CD tracks (HEAD = default branch)
argocd_target_revision: "{{ lookup('env', 'ARGOCD_TARGET_REVISION') | default('HEAD', true) }}"
