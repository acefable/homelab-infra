---
# Layer 1 — Bootstrap Variables

# Hostname
hostname_name: "{{ lookup('env', 'HOMELAB_HOSTNAME') | default('ubuntu-server', true) }}"

# Timezone
timezone_timezone: Etc/UTC

# Locale
locale_locale: en_US.UTF-8

# NTP
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org

ntp_fallback_servers:
  - 0.ubuntu.pool.ntp.org
  - 1.ubuntu.pool.ntp.org

# SSH
ssh_port: 22
ssh_permit_root_login: "prohibit-password"
ssh_pubkey_authentication: "yes"
ssh_password_authentication: "yes"  # Enabled in Layer 1; disabled in Layer 2
ssh_challenge_response_authentication: "no"
ssh_use_pam: "yes"
ssh_print_motd: "no"
ssh_loglevel: "VERBOSE"
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
