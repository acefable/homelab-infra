[defaults]
inventory = inventory/homelab/hosts.yml
# Accept new SSH host keys on first connection, warn on changes.
# More secure than disabling checking entirely.
host_key_checking = accept_new
retry_files_enabled = False
gathering = smart
stdout_callback = default
default_result_format = yaml
display_skipped_hosts = False
forks = 30
interpreter_python = auto_silent
roles_path = roles/

[ssh_connection]
pipelining = True
